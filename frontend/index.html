<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SecurePrompt AI Gateway</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="chart-lib.js"></script>
<script src="config.js"></script>
<style>
  body { background:#0b0f19; }
  ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-thumb { background:#334155; border-radius:4px; }
</style>
<script>
  window.addEventListener('error', function(e) {
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#ef4444;color:#fff;padding:15px;z-index:99999;font-family:monospace;font-size:12px;white-space:pre-wrap;box-shadow:0 4px 6px rgba(0,0,0,0.3);';
    errDiv.innerHTML = '<strong>JavaScript Error:</strong> ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : '');
    const closeBtn = document.createElement('button');
    closeBtn.innerText = '✕';
    closeBtn.style.cssText = 'float:right;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:2px 8px;border-radius:4px;cursor:pointer;font-weight:bold;';
    closeBtn.onclick = function() { errDiv.remove(); };
    errDiv.appendChild(closeBtn);
    document.body.appendChild(errDiv);
  });

  window.addEventListener('unhandledrejection', function(e) {
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#f59e0b;color:#000;padding:15px;z-index:99999;font-family:monospace;font-size:12px;white-space:pre-wrap;box-shadow:0 4px 6px rgba(0,0,0,0.3);';
    errDiv.innerHTML = '<strong>Unhandled Promise Rejection:</strong> ' + (e.reason ? (e.reason.message || e.reason) : 'Unknown reason') + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '');
    const closeBtn = document.createElement('button');
    closeBtn.innerText = '✕';
    closeBtn.style.cssText = 'float:right;background:rgba(0,0,0,0.2);border:none;color:#000;padding:2px 8px;border-radius:4px;cursor:pointer;font-weight:bold;';
    closeBtn.onclick = function() { errDiv.remove(); };
    errDiv.appendChild(closeBtn);
    document.body.appendChild(errDiv);
  });
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const API_BASE = window.SECUREPROMPT_API_BASE || "https://secureprompt-ai-gateway-backend.onrender.com/api";
const API_KEY = window.SECUREPROMPT_API_KEY || "";
const DEMO_MODE = window.SECUREPROMPT_DEMO_MODE || false;
const GITHUB_URL = window.SECUREPROMPT_GITHUB_URL || "";

window.CURRENT_USER = "admin";

async function apiCall(path, options = {}) {
  const headers = {
    "X-API-Key": API_KEY,
    "X-User-Id": window.CURRENT_USER || "admin",
    ...(options.headers || {}),
  };
  if (!(options.body instanceof FormData)) {
    headers["Content-Type"] = "application/json";
  }
  const resp = await fetch(`${API_BASE}${path}`, {
    ...options,
    headers,
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || "Request failed");
  }
  return resp.json();
}

const RISK_COLORS = {
  LOW: "text-emerald-400 border-emerald-500/40 bg-emerald-500/10",
  MEDIUM: "text-yellow-400 border-yellow-500/40 bg-yellow-500/10",
  HIGH: "text-orange-400 border-orange-500/40 bg-orange-500/10",
  CRITICAL: "text-red-400 border-red-500/40 bg-red-500/10",
};

function RiskBadge({ level }) {
  return (
    <span className={`px-3 py-1 rounded-full border text-sm font-semibold ${RISK_COLORS[level] || ""}`}>
      {level}
    </span>
  );
}

function SecurityReport({ report, onMask, masking }) {
  if (!report) return null;
  const entityList = Object.entries(report.detected_entity_summary || {});

  return (
    <div className="mt-6 rounded-xl border border-slate-700 bg-slate-900/60 p-5 space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div className="flex items-center gap-3">
          <span className="text-slate-300 font-mono text-sm">Risk Score: {report.risk_score}/100</span>
          <RiskBadge level={report.risk_level} />
        </div>
        <span className={`text-sm font-semibold ${report.decision === "BLOCK" ? "text-red-400" : report.decision === "WARN" ? "text-yellow-400" : "text-emerald-400"}`}>
          Decision: {report.decision}
        </span>
      </div>

      {entityList.length > 0 && (
        <div>
          <p className="text-slate-400 text-sm mb-1">Detected:</p>
          <div className="flex flex-wrap gap-2">
            {entityList.map(([type, count]) => (
              <span key={type} className="text-xs font-mono px-2 py-1 rounded bg-slate-800 text-slate-200 border border-slate-700">
                ✓ {type} {count > 1 ? `(${count})` : ""}
              </span>
            ))}
          </div>
        </div>
      )}

      {report.policy_violations?.length > 0 && (
        <div>
          <p className="text-slate-400 text-sm mb-1">Policy Violated:</p>
          <div className="flex flex-wrap gap-2">
            {report.policy_violations.map((v) => (
              <span key={v.policy_name} className="text-xs font-mono px-2 py-1 rounded bg-red-500/10 text-red-300 border border-red-500/30">
                {v.policy_name}
              </span>
            ))}
          </div>
        </div>
      )}

      {report.recommendations?.length > 0 && (
        <div>
          <p className="text-slate-400 text-sm mb-1">Recommendation:</p>
          <ul className="list-disc list-inside text-sm text-slate-300 space-y-1">
            {report.recommendations.map((r, i) => <li key={i}>{r}</li>)}
          </ul>
        </div>
      )}

      {report.auto_fix_available && (
        <button
          onClick={onMask}
          disabled={masking}
          className="mt-2 px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium disabled:opacity-50"
        >
          {masking ? "Masking..." : "🛡 Mask Sensitive Data (Auto Fix)"}
        </button>
      )}
    </div>
  );
}

function StatCard({ label, value, accent }) {
  return (
    <div className={`rounded-xl border border-slate-700 bg-slate-900/60 p-4 flex-1 min-w-[140px]`}>
      <p className="text-slate-400 text-xs uppercase tracking-wide">{label}</p>
      <p className={`text-2xl font-bold mt-1 ${accent || "text-slate-100"}`}>{value}</p>
    </div>
  );
}

function DashboardTab({ currentUser }) {
  const [summary, setSummary] = React.useState(null);
  const [error, setError] = React.useState(null);
  const decisionChartRef = React.useRef(null);
  const entityChartRef = React.useRef(null);
  const chartInstances = React.useRef({});

  const load = async () => {
    try {
      const res = await apiCall("/dashboard/summary");
      setSummary(res);
    } catch (e) {
      setError(e.message);
    }
  };

  React.useEffect(() => { load(); }, [currentUser]);

  React.useEffect(() => {
    if (!summary || !window.Chart) return;

    Object.values(chartInstances.current).forEach((c) => c && c.destroy());

    if (decisionChartRef.current) {
      chartInstances.current.decision = new Chart(decisionChartRef.current, {
        type: "doughnut",
        data: {
          labels: ["Allowed", "Warned", "Blocked"],
          datasets: [{
            data: [summary.allowed, summary.warned, summary.blocked],
            backgroundColor: ["#34d399", "#facc15", "#f87171"],
            borderWidth: 0,
          }],
        },
        options: { plugins: { legend: { labels: { color: "#cbd5e1" } } } },
      });
    }

    if (entityChartRef.current && summary.top_detected_entities?.length) {
      chartInstances.current.entity = new Chart(entityChartRef.current, {
        type: "bar",
        data: {
          labels: summary.top_detected_entities.map(([k]) => k),
          datasets: [{
            label: "Occurrences",
            data: summary.top_detected_entities.map(([, v]) => v),
            backgroundColor: "#818cf8",
          }],
        },
        options: {
          indexAxis: "y",
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } },
            y: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } },
          },
        },
      });
    }
  }, [summary]);

  if (error) return <div className="text-red-400 text-sm">{error}</div>;
  if (!summary) return <div className="text-slate-400 text-sm">Loading dashboard...</div>;

  return (
    <div className="space-y-6">
      <div className="flex flex-wrap gap-4">
        <StatCard label="Requests Processed" value={summary.requests_processed} />
        <StatCard label="Allowed" value={summary.allowed} accent="text-emerald-400" />
        <StatCard label="Warned" value={summary.warned} accent="text-yellow-400" />
        <StatCard label="Blocked" value={summary.blocked} accent="text-red-400" />
      </div>

      <div className="grid md:grid-cols-2 gap-6">
        <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-4">
          <p className="text-slate-300 text-sm mb-3 font-semibold">Decision Breakdown</p>
          <canvas ref={decisionChartRef} height="200"></canvas>
        </div>
        <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-4">
          <p className="text-slate-300 text-sm mb-3 font-semibold">Top Detected Entities</p>
          {summary.top_detected_entities?.length ? (
            <canvas ref={entityChartRef} height="200"></canvas>
          ) : (
            <p className="text-slate-500 text-sm">No detections yet — run some prompts through Analyze.</p>
          )}
        </div>
      </div>

      <button onClick={load} className="text-sm text-indigo-400 hover:text-indigo-300">↻ Refresh</button>
    </div>
  );
}

function AuditLogTab({ currentUser }) {
  const [logs, setLogs] = React.useState([]);
  const [error, setError] = React.useState(null);

  const load = async () => {
    try {
      const res = await apiCall("/audit-logs?limit=50");
      setLogs(res);
    } catch (e) {
      setError(e.message);
    }
  };

  React.useEffect(() => { load(); }, [currentUser]);

  return (
    <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-4 overflow-x-auto">
      <div className="flex justify-between items-center mb-3">
        <p className="text-slate-300 text-sm font-semibold">Recent Requests (metadata only — no raw prompt content stored)</p>
        <button onClick={load} className="text-sm text-indigo-400 hover:text-indigo-300">↻ Refresh</button>
      </div>
      {error && <p className="text-red-400 text-sm">{error}</p>}
      <table className="w-full text-xs">
        <thead>
          <tr className="text-slate-400 text-left border-b border-slate-800">
            <th className="py-2 pr-3">Time</th>
            <th className="py-2 pr-3">Decision</th>
            <th className="py-2 pr-3">Risk</th>
            <th className="py-2 pr-3">Entities</th>
            <th className="py-2 pr-3">Policies</th>
            <th className="py-2 pr-3">Provider/Model</th>
          </tr>
        </thead>
        <tbody>
          {logs.map((l) => (
            <tr key={l.id} className="border-b border-slate-800/50">
              <td className="py-2 pr-3 text-slate-400">{new Date(l.timestamp.endsWith('Z') ? l.timestamp : l.timestamp + 'Z').toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })}</td>
              <td className={`py-2 pr-3 font-semibold ${l.decision === "BLOCK" ? "text-red-400" : l.decision === "WARN" ? "text-yellow-400" : "text-emerald-400"}`}>{l.decision}</td>
              <td className="py-2 pr-3">{l.risk_score} ({l.risk_level})</td>
              <td className="py-2 pr-3 text-slate-300">{(l.entity_types || []).join(", ") || "—"}</td>
              <td className="py-2 pr-3 text-slate-300">{(l.policy_violations || []).join(", ") || "—"}</td>
              <td className="py-2 pr-3 text-slate-400">{l.provider || "—"} / {l.model || "—"}</td>
            </tr>
          ))}
        </tbody>
      </table>
      {logs.length === 0 && <p className="text-slate-500 text-sm mt-3">No requests analyzed yet.</p>}
    </div>
  );
}

function PoliciesTab() {
  const [policies, setPolicies] = React.useState([]);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    apiCall("/policies").then(setPolicies).catch((e) => setError(e.message));
  }, []);

  if (error) return <div className="text-red-400 text-sm">{error}</div>;

  return (
    <div className="space-y-3">
      <p className="text-slate-400 text-sm">
        Loaded from <code className="text-indigo-300">backend/app/policy/policies.yaml</code> — edit that file (no code changes needed) to change enforcement.
      </p>
      {policies.map((p) => (
        <div key={p.name} className="rounded-xl border border-slate-700 bg-slate-900/60 p-4">
          <div className="flex items-center justify-between">
            <span className="font-mono text-sm text-slate-100">{p.name}</span>
            <span className={`text-xs px-2 py-0.5 rounded-full border ${
              p.action === "BLOCK" ? "border-red-500/40 text-red-400" :
              p.action === "WARN" ? "border-yellow-500/40 text-yellow-400" :
              "border-emerald-500/40 text-emerald-400"}`}>{p.action}</span>
          </div>
          <p className="text-slate-400 text-sm mt-1">{p.description}</p>
          {p.match_entity_types?.length > 0 && (
            <p className="text-xs text-slate-500 mt-2 font-mono">{p.match_entity_types.join(", ")}</p>
          )}
        </div>
      ))}
    </div>
  );
}

function AnalysisReportView({ report, startDate, endDate }) {
  const trafficChartRef = React.useRef(null);
  const decisionsChartRef = React.useRef(null);
  const entitiesChartRef = React.useRef(null);
  const chartInstances = React.useRef({});

  React.useEffect(() => {
    if (!report || !window.Chart) return;

    Object.values(chartInstances.current).forEach((c) => c && c.destroy());

    if (trafficChartRef.current && report.daily_trends?.length) {
      chartInstances.current.traffic = new Chart(trafficChartRef.current, {
        type: "line",
        data: {
          labels: report.daily_trends.map((t) => t.date),
          datasets: [
            {
              label: "Request Volume",
              data: report.daily_trends.map((t) => t.count),
              borderColor: "#818cf8",
              backgroundColor: "rgba(129, 140, 248, 0.1)",
              borderWidth: 2,
              fill: true,
            },
            {
              label: "Avg Risk Score",
              data: report.daily_trends.map((t) => t.avg_risk),
              borderColor: "#f87171",
              backgroundColor: "transparent",
              borderWidth: 2,
              borderDash: [5, 5],
            }
          ],
        },
        options: {
          plugins: { legend: { labels: { color: "#cbd5e1" } } },
          scales: {
            x: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } },
            y: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } }
          },
        },
      });
    }

    if (decisionsChartRef.current) {
      const allowed = report.decisions.ALLOW || 0;
      const warned = report.decisions.WARN || 0;
      const blocked = report.decisions.BLOCK || 0;
      
      chartInstances.current.decisions = new Chart(decisionsChartRef.current, {
        type: "doughnut",
        data: {
          labels: ["Allowed", "Warned", "Blocked"],
          datasets: [{
            data: [allowed, warned, blocked],
            backgroundColor: ["#34d399", "#facc15", "#f87171"],
            borderWidth: 0,
          }],
        },
        options: { 
          plugins: { 
            legend: { 
              position: "bottom",
              labels: { color: "#cbd5e1", boxWidth: 12 } 
            } 
          } 
        },
      });
    }

    if (entitiesChartRef.current) {
      const entityEntries = Object.entries(report.entity_counts || {});
      const labels = entityEntries.map(([k]) => k);
      const data = entityEntries.map(([, v]) => v);

      chartInstances.current.entities = new Chart(entitiesChartRef.current, {
        type: "bar",
        data: {
          labels: labels.length ? labels : ["No data"],
          datasets: [{
            label: "Detections",
            data: data.length ? data : [0],
            backgroundColor: "#f59e0b",
          }],
        },
        options: {
          indexAxis: "y",
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#94a3b8", precision: 0 }, grid: { color: "#1e293b" } },
            y: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } },
          },
        },
      });
    }

    return () => {
      Object.values(chartInstances.current).forEach((c) => c && c.destroy());
    };
  }, [report]);

  return (
    <>
      <div className="flex flex-wrap gap-4">
        <StatCard label="Total Requests" value={report.total_requests} />
        <StatCard label="Avg Risk Score" value={report.avg_risk_score} accent="text-red-400" />
        <StatCard label="Sent Success Rate" value={`${report.was_sent_percentage}%`} accent="text-emerald-400" />
        <StatCard label="Avg Prompt Length" value={`${report.avg_prompt_char_count} chars`} />
      </div>

      <div className="grid md:grid-cols-3 gap-6">
        <div className="md:col-span-2 rounded-xl border border-slate-700 bg-slate-900/60 p-4">
          <p className="text-slate-300 text-sm mb-3 font-semibold">Daily Request Volume & Avg Risk Trend</p>
          <canvas ref={trafficChartRef} height="200"></canvas>
        </div>

        <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-4">
          <p className="text-slate-300 text-sm mb-3 font-semibold">Decision Distribution</p>
          <canvas ref={decisionsChartRef} height="200"></canvas>
        </div>
      </div>

      <div className="grid md:grid-cols-2 gap-6">
        <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-4">
          <p className="text-slate-300 text-sm mb-3 font-semibold">Entity Detections Overview</p>
          <canvas ref={entitiesChartRef} height="200"></canvas>
        </div>

        <div className="rounded-xl border border-indigo-500/20 bg-indigo-950/10 p-5 flex flex-col justify-between">
          <div>
            <p className="text-indigo-300 text-sm mb-3 font-bold flex items-center gap-2">
              <span>💡</span> EDA Insights & Anomalies
            </p>
            <ul className="space-y-3">
              {report.insights.map((insight, idx) => (
                <li key={idx} className="text-sm text-slate-300 flex items-start gap-2">
                  <span className="text-indigo-400 mt-0.5">•</span>
                  <span>{insight}</span>
                </li>
              ))}
            </ul>
          </div>
          <div className="text-xs text-slate-500 mt-4 border-t border-slate-800 pt-3">
            Exploratory Data Analysis generated automatically based on audit logs from {startDate} to {endDate}.
            <div className="text-[10px] text-slate-600 mt-1">
              Debug: Chart library = {window.Chart ? "LOADED" : "MISSING"} | trafficRef = {trafficChartRef.current ? "OK" : "NULL"}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function AnalysisTab({ currentUser }) {
  const today = new Date().toISOString().split('T')[0];
  const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
  
  const [startDate, setStartDate] = React.useState(lastWeek);
  const [endDate, setEndDate] = React.useState(today);
  const [report, setReport] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const loadReport = async () => {
    setLoading(true);
    setError(null);
    try {
      const res = await apiCall(`/analysis/report?start_date=${startDate}&end_date=${endDate}`);
      setReport(res);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  React.useEffect(() => {
    loadReport();
  }, [currentUser]);

  return (
    <div className="space-y-6">
      <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-5 flex flex-wrap items-end gap-4 justify-between">
        <div className="flex flex-wrap items-center gap-4">
          <div className="flex flex-col">
            <span className="text-xs uppercase text-slate-400 font-semibold mb-1">Start Date</span>
            <input
              type="date"
              value={startDate}
              onChange={(e) => setStartDate(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>
          <div className="flex flex-col">
            <span className="text-xs uppercase text-slate-400 font-semibold mb-1">End Date</span>
            <input
              type="date"
              value={endDate}
              onChange={(e) => setEndDate(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>
        </div>
        <button
          onClick={loadReport}
          disabled={loading}
          className="px-5 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-medium text-sm transition-colors shadow-lg shadow-indigo-950/20 disabled:opacity-50"
        >
          {loading ? "Analyzing..." : "📈 Run EDA Report"}
        </button>
      </div>

      {error && <div className="text-red-400 text-sm p-3 rounded-lg border border-red-500/30 bg-red-500/10">{error}</div>}

      {loading && <div className="text-slate-400 text-sm">Analyzing and generating report...</div>}

      {report && report.total_requests > 0 && !loading && (
        <AnalysisReportView report={report} startDate={startDate} endDate={endDate} />
      )}

      {report && report.total_requests === 0 && !loading && (
        <div className="text-center py-10 rounded-xl border border-slate-800 bg-slate-900/20 text-slate-500 text-sm">
          No audit logs found for the selected date range ({startDate} to {endDate}). Try selecting a broader range!
        </div>
      )}
    </div>
  );
}

function AuthView({ onLoginSuccess }) {
  const [isSignUp, setIsSignUp] = React.useState(false);
  const [name, setName] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [role, setRole] = React.useState("developer");
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [success, setSuccess] = React.useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    setSuccess(null);
    setLoading(true);

    try {
      if (isSignUp) {
        const res = await apiCall("/auth/signup", {
          method: "POST",
          body: JSON.stringify({ name, email, password, role }),
        });
        setSuccess("Account created successfully! Please sign in.");
        setIsSignUp(false);
        setPassword("");
      } else {
        const res = await apiCall("/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password }),
        });
        onLoginSuccess(res);
      }
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-[#0b0f19] text-slate-100 px-4">
      <div className="w-full max-w-md bg-slate-900/60 border border-slate-800 rounded-2xl p-8 shadow-2xl backdrop-blur-md">
        <div className="text-center mb-6">
          <h2 className="text-3xl font-extrabold text-indigo-400">🛡️ SecurePrompt</h2>
          <p className="text-slate-400 text-sm mt-1">Enterprise Zero-Trust AI Firewall Gateway</p>
        </div>

        <div className="flex border-b border-slate-800 mb-6">
          <button
            onClick={() => { setIsSignUp(false); setError(null); setSuccess(null); }}
            className={`flex-1 pb-3 text-sm font-semibold transition-colors border-b-2 ${!isSignUp ? "border-indigo-500 text-indigo-300" : "border-transparent text-slate-400 hover:text-slate-200"}`}
          >
            Sign In
          </button>
          <button
            onClick={() => { setIsSignUp(true); setError(null); setSuccess(null); }}
            className={`flex-1 pb-3 text-sm font-semibold transition-colors border-b-2 ${isSignUp ? "border-indigo-500 text-indigo-300" : "border-transparent text-slate-400 hover:text-slate-200"}`}
          >
            Create Account
          </button>
        </div>

        {error && <div className="mb-4 text-xs p-3 rounded-lg border border-red-500/30 bg-red-500/10 text-red-400">{error}</div>}
        {success && <div className="mb-4 text-xs p-3 rounded-lg border border-emerald-500/30 bg-emerald-500/10 text-emerald-400">{success}</div>}

        <form onSubmit={handleSubmit} className="space-y-4">
          {isSignUp && (
            <div>
              <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Full Name</label>
              <input
                type="text"
                required
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder="e.g. prathyusha"
                className="w-full bg-slate-950/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          )}

          <div>
            <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Email Address</label>
            <input
              type="email"
              required
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="name@company.com"
              className="w-full bg-slate-950/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>

          <div>
            <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Password</label>
            <input
              type="password"
              required
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              placeholder="••••••••"
              className="w-full bg-slate-950/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>

          {isSignUp && (
            <div>
              <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Enterprise Role</label>
              <select
                value={role}
                onChange={(e) => setRole(e.target.value)}
                className="w-full bg-slate-950/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-300"
              >
                <option value="developer">👤 User (Developer)</option>
                <option value="security_admin">🔒 Security Admin</option>
              </select>
            </div>
          )}

          <button
            type="submit"
            disabled={loading}
            className="w-full mt-4 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-semibold text-sm transition-all shadow-lg shadow-indigo-950/40 disabled:opacity-50"
          >
            {loading ? "Processing..." : isSignUp ? "Sign Up" : "Sign In"}
          </button>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [prompt, setPrompt] = React.useState("");
  const [report, setReport] = React.useState(null);
  const [analyzing, setAnalyzing] = React.useState(false);
  const [sending, setSending] = React.useState(false);
  const [masking, setMasking] = React.useState(false);
  const [maskedPrompt, setMaskedPrompt] = React.useState(null);
  const [llmResponse, setLlmResponse] = React.useState(null);
  const [provider, setProvider] = React.useState("groq");
  const [model, setModel] = React.useState("llama-3.1-8b-instant");
  const [error, setError] = React.useState(null);
  const [tab, setTab] = React.useState("gateway");
  const [authSession, setAuthSession] = React.useState(() => {
    const saved = localStorage.getItem("secureprompt_session");
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        window.CURRENT_USER = parsed.email;
        return parsed;
      } catch (e) {}
    }
    window.CURRENT_USER = "admin";
    return null;
  });

  const handleLoginSuccess = (session) => {
    localStorage.setItem("secureprompt_session", JSON.stringify(session));
    window.CURRENT_USER = session.email;
    setAuthSession(session);
  };

  const handleLogout = () => {
    localStorage.removeItem("secureprompt_session");
    setAuthSession(null);
    window.CURRENT_USER = "admin";
    setPrompt("");
    setReport(null);
    setMaskedPrompt(null);
    setLlmResponse(null);
    setSelectedFile(null);
    setExtractedText("");
    setShowExtractedText(false);
    setTab("gateway");
  };

  // File Upload States
  const [selectedFile, setSelectedFile] = React.useState(null);
  const [extractedText, setExtractedText] = React.useState("");
  const [showExtractedText, setShowExtractedText] = React.useState(false);

  const handleFileChange = (e) => {
    if (e.target.files && e.target.files[0]) {
      setSelectedFile(e.target.files[0]);
      setReport(null);
      setExtractedText("");
    }
  };

  const handleRemoveFile = () => {
    setSelectedFile(null);
    setExtractedText("");
    setReport(null);
  };

  const handleAnalyze = async () => {
    setAnalyzing(true);
    setError(null);
    setLlmResponse(null);
    setMaskedPrompt(null);
    setExtractedText("");
    try {
      let res;
      if (selectedFile) {
        const formData = new FormData();
        formData.append("prompt", prompt);
        formData.append("file", selectedFile);
        
        res = await apiCall("/analyze-file", {
          method: "POST",
          body: formData,
        });
        if (res.extracted_text) {
          setExtractedText(res.extracted_text);
          setShowExtractedText(true);
        }
      } else {
        res = await apiCall("/analyze", {
          method: "POST",
          body: JSON.stringify({ prompt, provider, model }),
        });
      }
      setReport(res);
    } catch (e) {
      setError(e.message);
    } finally {
      setAnalyzing(false);
    }
  };

  const handleMask = async () => {
    setMasking(true);
    try {
      const targetPrompt = selectedFile ? `${prompt}\n${extractedText}` : prompt;
      const res = await apiCall("/mask", { method: "POST", body: JSON.stringify({ prompt: targetPrompt }) });
      setMaskedPrompt(res.masked_prompt);
    } catch (e) {
      setError(e.message);
    } finally {
      setMasking(false);
    }
  };

  const handleSend = async (useMasked) => {
    if (!report) return;
    setSending(true);
    setError(null);
    try {
      const targetPrompt = (selectedFile && !useMasked) ? `${prompt}\n${extractedText}` : prompt;
      const res = await apiCall("/send", {
        method: "POST",
        body: JSON.stringify({
          request_id: report.request_id,
          prompt: targetPrompt,
          provider,
          model,
          use_masked_version: useMasked,
        }),
      });
      setLlmResponse(res);
    } catch (e) {
      setError(e.message);
    } finally {
      setSending(false);
    }
  };

  const sendEnabled = report && report.send_enabled;

  if (!authSession) {
    return <AuthView onLoginSuccess={handleLoginSuccess} />;
  }

  return (
    <div className="min-h-screen text-slate-100 max-w-4xl mx-auto px-6 py-10">
      {DEMO_MODE && (
        <div className="mb-4 text-xs px-3 py-2 rounded-lg bg-indigo-500/10 border border-indigo-500/30 text-indigo-300">
          🌐 Public demo — do not paste real sensitive data. Requests are rate-limited and audit metadata (no raw prompt content) may be logged.
        </div>
      )}
      <header className="mb-6 flex items-start justify-between gap-4 flex-wrap">
        <div>
          <h1 className="text-2xl font-bold flex items-center gap-2">🛡️ SecurePrompt AI Gateway</h1>
          <p className="text-slate-400 text-sm mt-1">Hello {authSession.name} — Zero-Trust firewall protecting your prompts.</p>
        </div>
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-2 bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-1.5 text-xs">
            <span className="text-slate-400 font-semibold uppercase">Role:</span>
            <span className={`font-semibold font-mono ${authSession.role === "security_admin" ? "text-indigo-400" : "text-emerald-400"}`}>
              {authSession.role}
            </span>
          </div>
          <button
            onClick={handleLogout}
            className="text-xs px-3 py-1.5 rounded-lg border border-red-500/30 bg-red-500/10 text-red-400 hover:bg-red-500/20 font-medium transition-colors"
          >
            Logout ✕
          </button>
        </div>
      </header>

      <nav className="flex gap-1 mb-6 border-b border-slate-800">
        {[
          ["gateway", "🔍 Gateway"],
          ["dashboard", "📊 Dashboard"],
          ["audit", "📜 Audit Log"],
          ["policies", "⚙️ Policies"],
          ["analysis", "📊 Analysis"],
        ].map(([key, label]) => (
          <button
            key={key}
            onClick={() => setTab(key)}
            className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors ${
              tab === key ? "border-indigo-500 text-indigo-300" : "border-transparent text-slate-400 hover:text-slate-200"
            }`}
          >
            {label}
          </button>
        ))}
      </nav>

      {tab === "dashboard" && <DashboardTab currentUser={authSession.email} />}
      {tab === "audit" && <AuditLogTab currentUser={authSession.email} />}
      {tab === "policies" && <PoliciesTab />}
      {tab === "analysis" && <AnalysisTab currentUser={authSession.email} />}

      {tab === "gateway" && <>
      <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-5 space-y-4">
        <div>
          <textarea
            value={prompt}
            onChange={(e) => { setPrompt(e.target.value); setReport(null); }}
            placeholder="Type your prompt here..."
            rows={6}
            className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
          
          <div className="flex items-center gap-3 mt-2">
            <label className="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300 hover:bg-slate-800 hover:text-white text-xs cursor-pointer transition-colors duration-200">
              📎 Attach File
              <input
                type="file"
                onChange={handleFileChange}
                className="hidden"
                accept=".txt,.md,.csv,.json,.pdf,.docx,.xlsx,.png,.jpg,.jpeg,.py,.js,.ts,.java,.yaml,.yml"
              />
            </label>
            
            {selectedFile && (
              <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-500/10 border border-indigo-500/30 text-indigo-300 text-xs">
                <span>📄 {selectedFile.name} ({(selectedFile.size / 1024).toFixed(1)} KB)</span>
                <button
                  onClick={handleRemoveFile}
                  className="hover:text-red-400 font-bold transition-colors ml-1"
                  title="Remove file"
                >
                  ✕
                </button>
              </div>
            )}
          </div>
        </div>

        <div className="flex items-center gap-3 mt-3">
          <select value={provider} onChange={(e) => setProvider(e.target.value)}
            className="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm">
            <option value="groq">Groq (Free)</option>
            <option value="ollama">Ollama (local)</option>
            <option value="openai">OpenAI-compatible</option>
          </select>
          <input value={model} onChange={(e) => setModel(e.target.value)}
            placeholder="model name (e.g. llama3)"
            className="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm flex-1" />
        </div>

        <div className="flex gap-3 mt-4">
          <button onClick={handleAnalyze} disabled={(!prompt && !selectedFile) || analyzing}
            className="px-5 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 font-medium disabled:opacity-40">
            {analyzing ? "Analyzing..." : "🔍 Analyze"}
          </button>
          <button onClick={() => handleSend(false)} disabled={!sendEnabled || sending}
            className="px-5 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 font-medium disabled:opacity-40 disabled:cursor-not-allowed">
            {sending ? "Sending..." : "🚀 Send"}
          </button>
          {maskedPrompt && (
            <button onClick={() => handleSend(true)} disabled={sending}
              className="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-medium disabled:opacity-40">
              Send Masked Version
            </button>
          )}
        </div>
        {!sendEnabled && report && (
          <p className="text-red-400 text-sm mt-2">🚫 Sensitive information detected. Send is disabled until resolved.</p>
        )}
      </div>

      {error && (
        <div className="mt-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-300 text-sm">{error}</div>
      )}

      <SecurityReport report={report} onMask={handleMask} masking={masking} />

      {extractedText && (
        <div className="mt-4 rounded-xl border border-slate-700 bg-slate-900/40 p-4">
          <button
            onClick={() => setShowExtractedText(!showExtractedText)}
            className="flex items-center justify-between w-full text-sm font-semibold text-slate-300 hover:text-slate-100"
          >
            <span className="flex items-center gap-2">
              📝 Extracted File Content ({selectedFile?.name})
            </span>
            <span>{showExtractedText ? "▲ Hide" : "▼ Show"}</span>
          </button>
          {showExtractedText && (
            <pre className="mt-3 p-3 bg-slate-950/80 rounded-lg border border-slate-800 text-xs font-mono text-slate-300 max-h-60 overflow-y-auto whitespace-pre-wrap">
              {extractedText}
            </pre>
          )}
        </div>
      )}

      {maskedPrompt && (
        <div className="mt-4 rounded-xl border border-indigo-700/40 bg-indigo-500/5 p-4">
          <p className="text-indigo-300 text-sm mb-2">Masked Preview:</p>
          <pre className="whitespace-pre-wrap text-sm font-mono text-slate-200">{maskedPrompt}</pre>
        </div>
      )}

      {llmResponse && (
        <div className="mt-6 rounded-xl border border-slate-700 bg-slate-900/60 p-5">
          <div className="flex items-center justify-between mb-2">
            <p className="text-slate-400 text-sm">Response from {llmResponse.provider_used} / {llmResponse.model_used}</p>
            {llmResponse.was_sanitized && (
              <span className="text-xs px-2 py-1 rounded bg-yellow-500/10 text-yellow-300 border border-yellow-500/30">Output sanitized</span>
            )}
          </div>
          <p className="whitespace-pre-wrap text-sm">{llmResponse.response_text}</p>
        </div>
      )}
      </>}

      <footer className="mt-12 pt-6 border-t border-slate-800 text-xs text-slate-500 flex justify-between flex-wrap gap-2">
        <span>SecurePrompt AI Gateway — open source Zero-Trust AI DLP firewall.</span>
        {GITHUB_URL && <a href={GITHUB_URL} target="_blank" rel="noreferrer" className="text-indigo-400 hover:text-indigo-300">Source code →</a>}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
